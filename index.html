<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Onus WMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@500;700;800&family=REM:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ============================================================
   Onus WMS — Sistema de diseño
   Azul oscuro #000935 + Turquesa #00C9CE
   Tipografía: Raleway (titulares) + REM (UI/cuerpo) + JetBrains Mono (datos)
   ============================================================ */

:root {
  /* Marca */
  --brand:        #000935;
  --brand-2:      #0a154d;
  --accent:       #00C9CE;
  --accent-soft:  rgba(0, 201, 206, 0.12);
  --accent-line:  rgba(0, 201, 206, 0.32);

  /* Tema oscuro (predeterminado) */
  --bg-0:         #030712;     /* canvas */
  --bg-1:         #0a0f1c;     /* sidebar */
  --bg-2:         #111827;     /* cards */
  --bg-3:         #161f30;     /* hover, table-stripe */
  --bg-4:         #1f2a3f;
  --border:       #1d2638;
  --border-2:     #283349;
  --fg-0:         #ffffff;
  --fg-1:         #e5e7eb;
  --fg-2:         #9ca3af;
  --fg-3:         #6b7280;
  --danger:       #ef4444;
  --warn:         #f59e0b;
  --ok:           #10b981;

  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 20px;

  --shadow-1: 0 1px 0 rgba(255,255,255,0.04) inset, 0 1px 2px rgba(0,0,0,0.3);
  --shadow-2: 0 8px 32px rgba(0,0,0,0.4);

  /* Densidad */
  --row-h: 40px;
  --pad-card: 24px;
}

[data-theme="light"] {
  --bg-0:         #fafafa;
  --bg-1:         #ffffff;
  --bg-2:         #ffffff;
  --bg-3:         #f4f5f7;
  --bg-4:         #eceef2;
  --border:       #e5e7eb;
  --border-2:     #d1d5db;
  --fg-0:         #000935;
  --fg-1:         #111827;
  --fg-2:         #4b5563;
  --fg-3:         #9ca3af;
  --shadow-1: 0 1px 0 rgba(255,255,255,1) inset, 0 1px 2px rgba(0,9,53,0.06);
  --shadow-2: 0 8px 24px rgba(0,9,53,0.08);
  --accent-soft:  rgba(0, 201, 206, 0.14);
}

[data-density="compact"] {
  --row-h: 32px;
  --pad-card: 18px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg-0);
  color: var(--fg-1);
  font-family: 'REM', 'Inter', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-variant-numeric: tabular-nums;
}

#root { min-height: 100vh; }

h1, h2, h3, h4 {
  font-family: 'Raleway', system-ui, sans-serif;
  color: var(--fg-0);
  margin: 0;
  letter-spacing: -0.01em;
}
h1 { font-weight: 800; font-size: 28px; line-height: 1.2; letter-spacing: -0.02em; }
h2 { font-family: 'REM', sans-serif; font-weight: 500; font-size: 22px; line-height: 1.3; }
h3 { font-family: 'REM', sans-serif; font-weight: 500; font-size: 16px; line-height: 1.4; }
h4 { font-family: 'REM', sans-serif; font-weight: 500; font-size: 14px; line-height: 1.4; }

button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }

/* ===== App shell ===== */
.app {
  display: grid;
  grid-template-columns: 232px 1fr;
  min-height: 100vh;
  background: var(--bg-0);
}
.app[data-nav="collapsed"] { grid-template-columns: 64px 1fr; }

/* ===== Sidebar ===== */
.sidebar {
  background: var(--bg-1);
  border-right: 1px solid var(--border);
  padding: 18px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 10px 18px;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.sidebar-mark {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--accent);
  color: #000935;
  display: grid;
  place-items: center;
  font-family: 'Raleway', sans-serif;
  font-weight: 800;
  font-size: 16px;
  flex-shrink: 0;
}
.sidebar-mark-img {
  width: 36px;
  height: 36px;
  flex-shrink: 0;
  object-fit: contain;
}
.brand-wordmark {
  height: 22px;
  width: auto;
  display: block;
}

.sidebar-brand-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
  overflow: hidden;
}
.sidebar-brand-text .name {
  font-family: 'Raleway', sans-serif;
  font-weight: 800;
  color: var(--fg-0);
  letter-spacing: -0.01em;
  font-size: 15px;
}
.sidebar-brand-text .sub {
  font-size: 10px;
  color: var(--fg-2);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 2px;
}
[data-nav="collapsed"] .sidebar-brand-text { display: none; }

.nav-group-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--fg-3);
  padding: 14px 12px 6px;
  font-weight: 600;
}
[data-nav="collapsed"] .nav-group-label { opacity: 0; height: 8px; padding: 0; overflow: hidden; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 10px;
  border-radius: var(--r-md);
  color: var(--fg-2);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  transition: background 120ms, color 120ms;
}
.nav-item:hover { background: var(--bg-3); color: var(--fg-1); }
.nav-item.active {
  background: var(--accent-soft);
  color: var(--accent);
}
.nav-item .icon {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  stroke: currentColor;
  stroke-width: 1.75;
  fill: none;
}
.nav-item .badge {
  margin-left: auto;
  background: var(--bg-3);
  color: var(--fg-2);
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 999px;
  font-weight: 600;
}
.nav-item.active .badge { background: var(--accent); color: #000935; }
[data-nav="collapsed"] .nav-item .label,
[data-nav="collapsed"] .nav-item .badge { display: none; }
[data-nav="collapsed"] .nav-item { justify-content: center; padding: 10px; }

.sidebar-foot {
  margin-top: auto;
  padding: 12px 10px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #5b8def);
  color: #000935;
  display: grid; place-items: center;
  font-weight: 700; font-size: 12px;
  flex-shrink: 0;
}
.sidebar-foot .who { line-height: 1.2; overflow: hidden; }
.sidebar-foot .who .n { font-weight: 600; font-size: 13px; color: var(--fg-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-foot .who .r { font-size: 11px; color: var(--fg-3); }
[data-nav="collapsed"] .sidebar-foot .who { display: none; }

/* ===== Main ===== */
.main {
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.topbar {
  height: 56px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 24px;
  background: var(--bg-0);
  position: sticky;
  top: 0;
  z-index: 10;
}
.crumbs {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--fg-2);
  font-size: 13px;
}
.crumbs .sep { color: var(--fg-3); }
.crumbs .now { color: var(--fg-1); font-weight: 500; }

.topbar-search {
  margin-left: auto;
  width: 320px;
  position: relative;
}
.topbar-search input {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--border);
  color: var(--fg-1);
  padding: 7px 12px 7px 34px;
  border-radius: var(--r-md);
  font-size: 13px;
  outline: none;
  transition: border-color 120ms, background 120ms;
}
.topbar-search input:focus { border-color: var(--accent); background: var(--bg-3); }
.topbar-search input::placeholder { color: var(--fg-3); }
.topbar-search svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  color: var(--fg-3);
}
.topbar .iconbtn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--fg-2);
  width: 34px; height: 34px;
  border-radius: var(--r-md);
  display: grid; place-items: center;
  transition: all 120ms;
}
.topbar .iconbtn:hover { color: var(--fg-1); border-color: var(--border-2); background: var(--bg-2); }
.kbd {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10px;
  background: var(--bg-3);
  border: 1px solid var(--border);
  padding: 2px 5px;
  border-radius: 4px;
  color: var(--fg-3);
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
}

/* ===== Page ===== */
.page {
  padding: 28px 32px 60px;
  max-width: 1480px;
  width: 100%;
  margin: 0 auto;
}
.page-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 24px;
}
.page-head .lead { color: var(--fg-2); font-size: 14px; margin-top: 6px; }
.page-actions { display: flex; gap: 8px; align-items: center; }

/* ===== Cards ===== */
.card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--pad-card);
}
.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  gap: 12px;
}
.card-title {
  font-family: 'REM', sans-serif;
  font-weight: 500;
  font-size: 14px;
  color: var(--fg-1);
}
.card-sub { font-size: 12px; color: var(--fg-3); }

/* ===== KPI ===== */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 20px;
}
.kpi {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.kpi .label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--fg-2);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 500;
}
.kpi .label .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
.kpi .value {
  font-family: 'Raleway', sans-serif;
  font-weight: 800;
  font-size: 32px;
  color: var(--fg-0);
  margin-top: 8px;
  letter-spacing: -0.02em;
  line-height: 1;
}
.kpi .delta {
  margin-top: 8px;
  font-size: 12px;
  color: var(--fg-2);
  display: flex;
  align-items: center;
  gap: 6px;
}
.kpi .delta.up { color: var(--ok); }
.kpi .delta.down { color: var(--danger); }
.kpi .spark {
  position: absolute;
  right: 0; bottom: 0;
  width: 100px; height: 40px;
  opacity: 0.7;
}

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: var(--r-md);
  font-size: 13px;
  font-weight: 500;
  border: 1px solid transparent;
  transition: all 120ms;
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent);
  color: #000935;
}
.btn-primary:hover { background: #00b8bd; }
.btn-ghost {
  background: transparent;
  color: var(--fg-1);
  border-color: var(--border);
}
.btn-ghost:hover { background: var(--bg-2); border-color: var(--border-2); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* ===== Tabla ===== */
.tbl {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
}
.tbl th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-3);
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  background: var(--bg-2);
  position: sticky; top: 0;
}
.tbl td {
  padding: 0 14px;
  height: var(--row-h);
  border-bottom: 1px solid var(--border);
  color: var(--fg-1);
  vertical-align: middle;
}
.tbl tbody tr { transition: background 120ms; }
.tbl tbody tr:hover { background: var(--bg-3); cursor: pointer; }
.tbl tbody tr.selected { background: var(--accent-soft); }
.tbl .mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--fg-1); }
.tbl .muted { color: var(--fg-2); }
.tbl .num { text-align: right; font-variant-numeric: tabular-nums; }

.tbl-wrap {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.tbl-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-2);
}
.tbl-toolbar input,
.tbl-toolbar select {
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--fg-1);
  border-radius: var(--r-sm);
  padding: 6px 10px;
  font-size: 13px;
  outline: none;
}
.tbl-toolbar input:focus,
.tbl-toolbar select:focus { border-color: var(--accent); }
.tbl-toolbar input::placeholder { color: var(--fg-3); }
.tbl-toolbar .grow { flex: 1; min-width: 200px; }
.tbl-toolbar .count { color: var(--fg-3); font-size: 12px; margin-right: auto; }

/* ===== Badges / chips ===== */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  background: var(--bg-3);
  color: var(--fg-2);
  border: 1px solid var(--border);
  text-transform: lowercase;
  letter-spacing: 0.02em;
}
.chip.almacenaje { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-line); }
.chip.picking    { background: rgba(91,141,239,0.15); color: #5b8def; border-color: rgba(91,141,239,0.3); }
.chip.packing    { background: rgba(236,72,153,0.15); color: #ec4899; border-color: rgba(236,72,153,0.3); }
.chip.carga      { background: rgba(245,158,11,0.15); color: #f59e0b; border-color: rgba(245,158,11,0.3); }
.chip.descarga   { background: rgba(167,139,250,0.15); color: #a78bfa; border-color: rgba(167,139,250,0.3); }
.chip-status {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;
}
.chip-status.activo { background: rgba(16,185,129,0.12); color: var(--ok); }
.chip-status.salido { background: var(--bg-3); color: var(--fg-3); }
.chip-status .d { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* ===== Layout helpers ===== */
.row { display: flex; gap: 12px; align-items: center; }
.col { display: flex; flex-direction: column; }
.gap-4 { gap: 16px; }
.gap-6 { gap: 24px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.grid-dash { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
.spacer { flex: 1; }

/* ===== Forms ===== */
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.field label {
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-2);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.field input,
.field select,
.field textarea {
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--fg-1);
  padding: 9px 12px;
  border-radius: var(--r-md);
  font-size: 14px;
  outline: none;
  transition: border-color 120ms;
}
.field input:focus,
.field select:focus,
.field textarea:focus { border-color: var(--accent); }

/* ===== Drawer ===== */
.drawer-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 9, 53, 0.55);
  backdrop-filter: blur(2px);
  z-index: 50;
  animation: fadein 160ms ease;
}
.drawer {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: 480px;
  background: var(--bg-1);
  border-left: 1px solid var(--border);
  z-index: 51;
  display: flex;
  flex-direction: column;
  animation: slidein 220ms cubic-bezier(0.32, 0.72, 0, 1);
  box-shadow: var(--shadow-2);
}
.drawer-head {
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.drawer-body { padding: 24px; overflow-y: auto; flex: 1; }
.drawer-foot {
  padding: 14px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
@keyframes slidein { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ===== Charts ===== */
.chart-bars {
  display: flex;
  align-items: flex-end;
  gap: 6px;
  height: 200px;
  padding: 8px 0;
}
.chart-bars .col-day {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  height: 100%;
}
.chart-bars .stack {
  flex: 1;
  width: 100%;
  display: flex;
  flex-direction: column-reverse;
  border-radius: 4px;
  overflow: hidden;
  background: var(--bg-3);
  position: relative;
}
.chart-bars .seg { transition: opacity 120ms; }
.chart-bars .seg:hover { opacity: 0.8; }
.chart-bars .axis-label { font-size: 10px; color: var(--fg-3); font-family: 'JetBrains Mono', monospace; }
.legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--fg-2); }
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-item .sw { width: 10px; height: 10px; border-radius: 2px; }

/* Donut */
.donut-wrap { display: flex; align-items: center; gap: 24px; }
.donut { width: 160px; height: 160px; flex-shrink: 0; }
.donut-list { flex: 1; display: flex; flex-direction: column; gap: 10px; }
.donut-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.donut-row .sw { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.donut-row .name { color: var(--fg-1); flex: 1; text-transform: capitalize; }
.donut-row .num { color: var(--fg-2); font-variant-numeric: tabular-nums; font-family: 'JetBrains Mono', monospace; font-size: 12px; }

/* ===== Empty states / misc ===== */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--fg-3);
  font-size: 14px;
}

.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* Cell pill for ubicación */
.loc-pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  background: var(--bg-3);
  border: 1px solid var(--border);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--fg-1);
}

/* Barcode pseudo render */
.barcode {
  display: inline-flex;
  align-items: flex-end;
  gap: 1px;
  height: 16px;
}
.barcode i {
  display: inline-block;
  width: 1.5px;
  background: var(--fg-1);
  height: 100%;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.tab {
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--fg-2);
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 120ms;
}
.tab:hover { color: var(--fg-1); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-2);
  border: 1px solid var(--accent-line);
  color: var(--fg-0);
  padding: 12px 20px;
  border-radius: var(--r-md);
  box-shadow: var(--shadow-2);
  z-index: 100;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: toastin 220ms ease;
}
.toast .ok-d { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
@keyframes toastin { from { transform: translate(-50%, 10px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

/* ====== Top-nav layout variant ====== */
.app[data-layout="top"] {
  grid-template-columns: 1fr;
}
.app[data-layout="top"] .sidebar { display: none; }
.app[data-layout="top"] .topnav {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 24px;
  height: 60px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
}
.topnav { display: none; }
.app[data-layout="top"] .topnav { display: flex; }
.topnav .brand-block {
  display: flex; align-items: center; gap: 10px;
  padding-right: 18px; margin-right: 12px;
  border-right: 1px solid var(--border);
  height: 60px;
}
.topnav .nav-item { padding: 7px 14px; }

/* Print-friendly tweaks (PDF preview pseudo) */
.invoice-paper {
  background: white;
  color: #000935;
  padding: 32px;
  border-radius: var(--r-lg);
  font-family: 'REM', sans-serif;
  border: 1px solid var(--border);
}
.invoice-paper h1, .invoice-paper h2, .invoice-paper h3 { color: #000935; }

/* Scanner placeholder */
.scanner-frame {
  border: 2px dashed var(--accent-line);
  background: var(--accent-soft);
  border-radius: var(--r-lg);
  padding: 24px;
  text-align: center;
  color: var(--fg-2);
}
.scanner-frame .big {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  color: var(--accent);
  letter-spacing: 0.1em;
  margin: 6px 0;
}

/* Section header inside cards */
.section-h {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.section-h .title {
  font-family: 'REM', sans-serif;
  font-weight: 500;
  font-size: 14px;
  color: var(--fg-1);
}
.section-h .more {
  font-size: 12px; color: var(--fg-3);
}

/* Subtle scrollbar in dark */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-2); }

</style>

    devolucion: 2.50,
  };
  return parseFloat(precios[tipo]||0);
};

const calcularCoste = (cliente_id, tipo, cantidad) => {
  const precio = calcularPrecio(cliente_id, tipo);
  const fijo = ["carga","descarga"].includes(tipo);
  return fijo ? precio : precio * parseFloat(cantidad||1);
};

const cargarDatos = async () => {
  try {
    const [cls, trs, movs, stk] = await Promise.all([
      sbGet("clientes","?select=*,tarifas(nombre)&order=empresa"),
      sbGet("tarifas","?select=*&order=nombre"),
      sbGet("movimientos","?select=*,clientes(nombre,empresa)&order=created_at.desc&limit=500"),
      sbGet("stock","?select=*,clientes(nombre,empresa)&order=fecha_entrada.desc"),
    ]);

    TARIFAS = (trs||[]).map(t=>({
      ...t,
      clientes_asignados: (cls||[]).filter(c=>c.tarifa_id===t.id).length
    }));

    STOCK = (stk||[]).map(s=>({
      ...s,
      ubicacion: s.observaciones||"—",
      barcode: s.pallet,
      sku: s.referencia||"—",
    }));

    MOVIMIENTOS = (movs||[]).map(m=>({
      ...m,
      empresa: m.clientes?.empresa||"—",
      obs: m.observaciones||"",
      hora: m.created_at?m.created_at.slice(11,16):"",
      coste: parseFloat(m.coste||0),
      cantidad: parseFloat(m.cantidad||0),
    }));

    const hoy = new Date().toISOString().split("T")[0];
    const primerMes = hoy.slice(0,7)+"-01";
    const movHoy = MOVIMIENTOS.filter(m=>m.fecha===hoy);
    const movMes = MOVIMIENTOS.filter(m=>m.fecha>=primerMes);

    CLIENTES = (cls||[]).map(c=>({
      ...c,
      pago: c.condiciones_pago,
      pallets_activos: STOCK.filter(s=>s.activo&&s.cliente_id===c.id).length,
      facturado_mes: movMes.filter(m=>m.cliente_id===c.id).reduce((s,m)=>s+m.coste,0),
    }));

    KPI_HOY = {
      ops_hoy: movHoy.length,
      delta_ops: "",
      pallets_activos: STOCK.filter(s=>s.activo).length,
      delta_pallets: "",
      ingresos_hoy: movHoy.reduce((s,m)=>s+m.coste,0),
      delta_ingresos: "",
      clientes_activos: new Set(STOCK.filter(s=>s.activo).map(s=>s.cliente_id)).size,
      ocupacion: Math.min(Math.round((STOCK.filter(s=>s.activo).length/200)*100),100),
    };

    SERIE_14D = Array.from({length:14},(_,i)=>{
      const d=new Date(); d.setDate(d.getDate()-(13-i));
      const key=d.toISOString().split("T")[0];
      const dm=MOVIMIENTOS.filter(m=>m.fecha===key);
      return {
        d: String(d.getDate()),
        alm: dm.filter(m=>m.tipo==="almacenaje").reduce((s,m)=>s+m.cantidad,0),
        pic: dm.filter(m=>["picking","empaquetado"].includes(m.tipo)).reduce((s,m)=>s+m.cantidad,0),
        car: dm.filter(m=>["carga","descarga"].includes(m.tipo)).reduce((s,m)=>s+m.cantidad,0),
      };
    });

    const colores={almacenaje:"var(--accent)",picking:"#5b8def",descarga:"#a78bfa",carga:"#f59e0b",empaquetado:"#ec4899","distribucion-interna":"#10b981","distribucion-externa":"#06b6d4",paletizacion:"#f97316",inventario:"#8b5cf6",devolucion:"#ef4444"};
    const counts={};
    movMes.forEach(m=>counts[m.tipo]=(counts[m.tipo]||0)+1);
    const total=movMes.length||1;
    DIST_TIPOS=Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([tipo,count])=>({tipo,count,pct:Math.round(count/total*100),color:colores[tipo]||"var(--accent)"}));

    // Fact últimos 6 meses
    const ahora=new Date();
    FACT_MENSUAL=[];
    for(let i=5;i>=0;i--){
      const d=new Date(ahora.getFullYear(),ahora.getMonth()-i,1);
      const primer=d.toISOString().split("T")[0].slice(0,7)+"-01";
      const ultimo=new Date(d.getFullYear(),d.getMonth()+1,0).toISOString().split("T")[0];
      const tot=MOVIMIENTOS.filter(m=>m.fecha>=primer&&m.fecha<=ultimo).reduce((s,m)=>s+m.coste,0);
      FACT_MENSUAL.push({mes:MESES[d.getMonth()].slice(0,3),total:Math.round(tot*100)/100});
    }

    Object.assign(window,{TARIFAS,CLIENTES,STOCK,MOVIMIENTOS,KPI_HOY,SERIE_14D,DIST_TIPOS,TIPO_OP,FACT_MENSUAL,empresaPorCliente,nombrePorCliente,fmt,fmtN,fmtFecha});
    if(window._wmsReload) window._wmsReload();
    return true;
  } catch(e) {
    console.error("Error cargando datos:", e);
    return false;
  }
};

const generarPDF = async (tipo, datos, mes, anio, cliente) => {
  try {
    const r = await fetch(FUNC_URL, {
      method:"POST",
      headers:{"Authorization":`Bearer ${_wmsToken||SUPABASE_KEY}`,"apikey":SUPABASE_KEY,"Content-Type":"application/json"},
      body: JSON.stringify({tipo,datos,mes,anio,cliente}),
    });
    if(!r.ok) throw new Error(await r.text());
    const {html} = await r.json();
    const blob = new Blob([html],{type:"text/html"});
    const url = URL.createObjectURL(blob);
    const a = Object.assign(document.createElement("a"),{href:url,target:"_blank"});
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url),3000);
  } catch(e){ alert("Error PDF: "+e.message); }
};

const calcularReporteAlmacenaje = (mesN,anioN,clienteId=null) => {
  const primer=`${anioN}-${String(mesN).padStart(2,"0")}-01`;
  const ultimo=new Date(anioN,mesN,0).toISOString().split("T")[0];
  return STOCK.filter(s=>{
    const ent=s.fecha_entrada||""; const sal=s.fecha_salida||ultimo;
    return ent<=ultimo && sal>=primer && (!clienteId||s.cliente_id===clienteId);
  }).map(s=>{
    const c=CLIENTES.find(c=>c.id===s.cliente_id);
    const t=TARIFAS.find(t=>t.id===c?.tarifa_id);
    const pd=parseFloat(t?.precio_pallet_dia||0);
    const ent=new Date(Math.max(new Date(s.fecha_entrada),new Date(primer)));
    const sal=new Date(Math.min(new Date(s.fecha_salida||ultimo),new Date(ultimo)));
    const dias=Math.max(Math.round((sal-ent)/86400000)+1,0);
    return {cliente:c?.nombre||"—",empresa:c?.empresa||"—",pallet:s.pallet,referencia:s.referencia||"—",fecha_entrada:s.fecha_entrada,fecha_salida:s.fecha_salida,dias,precio_dia:pd,coste:Math.round(dias*pd*100)/100};
  });
};

const calcularReporteOperaciones = (mesN,anioN,tipos=null,clienteId=null) => {
  const primer=`${anioN}-${String(mesN).padStart(2,"0")}-01`;
  const ultimo=new Date(anioN,mesN,0).toISOString().split("T")[0];
  return MOVIMIENTOS.filter(m=>{
    return m.fecha>=primer&&m.fecha<=ultimo&&(!tipos||tipos.includes(m.tipo))&&(!clienteId||m.cliente_id===clienteId);
  }).map(m=>({...m,empresa:empresaPorCliente(m.cliente_id),cliente:nombrePorCliente(m.cliente_id)}));
};

const calcularResumenMensual = (mesN,anioN) => {
  return CLIENTES.map(c=>{
    const alm=calcularReporteAlmacenaje(mesN,anioN,c.id);
    const ops=calcularReporteOperaciones(mesN,anioN,null,c.id);
    const totalAlm=alm.reduce((s,r)=>s+r.coste,0);
    const pickCost=ops.filter(o=>["picking","empaquetado"].includes(o.tipo)).reduce((s,o)=>s+o.coste,0);
    const cargCost=ops.filter(o=>o.tipo==="carga").reduce((s,o)=>s+o.coste,0);
    const descCost=ops.filter(o=>o.tipo==="descarga").reduce((s,o)=>s+o.coste,0);
    const distCost=ops.filter(o=>o.tipo?.includes("distribucion")).reduce((s,o)=>s+o.coste,0);
    const total=totalAlm+pickCost+cargCost+descCost+distCost;
    if(total===0&&alm.length===0&&ops.length===0) return null;
    const t=TARIFAS.find(t=>t.id===c.tarifa_id);
    return {cliente_id:c.id,cliente:c.nombre,empresa:c.empresa||"—",condiciones_pago:c.pago||"—",tarifa:t?.nombre||"Sin tarifa",pallets_almacenados:alm.length,total_almacenaje:Math.round(totalAlm*100)/100,picking_coste:Math.round(pickCost*100)/100,cargas_coste:Math.round(cargCost*100)/100,descargas_coste:Math.round(descCost*100)/100,distribucion_coste:Math.round(distCost*100)/100,total:Math.round(total*100)/100,movimientos:ops};
  }).filter(Boolean).sort((a,b)=>b.total-a.total);
};

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}

  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

const Toast = ({ msg }) => msg ? (
  <div className="toast"><span className="ok-d" /> {msg}</div>

// ---- Drawer ----
const Drawer = ({ open, onClose, title, children, footer }) => {
  if (!open) return null;
  return (
    <>
      <div className="drawer-backdrop" onClick={onClose} />
      <div className="drawer">
        <div className="drawer-head">
          <h3>{title}</h3>
          <button className="iconbtn" onClick={onClose}><Icon name="close" /></button>
        </div>
        <div className="drawer-body">{children}</div>
        {footer && <div className="drawer-foot">{footer}</div>}
      </div>
    </>
  );
};

// ---- Sparkline ----
const Spark = ({ data, color = "var(--accent)" }) => {
  const w = 100, h = 40, max = Math.max(...data), min = Math.min(...data);
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / Math.max(max - min, 1)) * (h - 6) - 3;
    return `${x},${y}`;
  }).join(" ");
  return (
    <svg className="spark" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" />
      <polyline points={`${pts} ${w},${h} 0,${h}`} fill={color} opacity="0.08" />
    </svg>
  );
};

Object.assign(window, { Icon, Sidebar, TopNav, Topbar, Toast, Drawer, Spark, NAV });

const Operaciones = ({ onNew, onSelect, selectedId }) => {
  const [tipo, setTipo] = React.useState("todos");
  const [cli, setCli] = React.useState("todos");
  const [q, setQ] = React.useState("");
  const [, rerender] = React.useReducer(x=>x+1,0);
  React.useEffect(()=>{ window._wmsReload=rerender; },[]);

  const rows = MOVIMIENTOS.filter(m => {
    if (tipo!=="todos" && m.tipo!==tipo) return false;
    if (cli!=="todos" && String(m.cliente_id)!==cli) return false;
    if (q && !(`${empresaPorCliente(m.cliente_id)} ${m.obs}`.toLowerCase().includes(q.toLowerCase()))) return false;
    return true;
  });
  const total = rows.reduce((s,m)=>s+m.coste,0);
  const mesActual = new Date().toISOString().slice(0,7)+"-01";
  const opsMes = MOVIMIENTOS.filter(m=>m.fecha>=mesActual);
  const tipoFrecuente = Object.entries(opsMes.reduce((a,m)=>{a[m.tipo]=(a[m.tipo]||0)+1;return a;},{})).sort((a,b)=>b[1]-a[1])[0];

  const exportar = () => {
    const cols = ["ID","Fecha","Cliente","Tipo","Cantidad","Coste","Observaciones"];
    const data = fmtCSV(rows.map(m=>({
      "ID":m.id,"Fecha":fmtFecha(m.fecha),"Cliente":empresaPorCliente(m.cliente_id),
      "Tipo":TIPO_OP[m.tipo]?.label||m.tipo,"Cantidad":m.cantidad,"Coste":m.coste,"Observaciones":m.obs
    })),cols);
    downloadCSV(data, `operaciones_${new Date().toISOString().slice(0,10)}.csv`);
  };

  return (
    <div className="page">
      <div className="page-head">
        <div>
          <h1>Operaciones</h1>
          <p className="lead">Registro completo de movimientos · {rows.length} resultados</p>
        </div>
        <div className="page-actions">
          <button className="btn btn-ghost" onClick={exportar}><Icon name="download"/> Exportar CSV</button>
          <button className="btn btn-primary" onClick={onNew}><Icon name="plus"/> Nueva operación</button>
        </div>
      </div>

      <div className="kpi-grid" style={{gridTemplateColumns:"repeat(4,1fr)"}}>
        <div className="kpi"><div className="label">Operaciones (mes)</div><div className="value">{opsMes.length}</div></div>
        <div className="kpi"><div className="label">Coste facturado (mes)</div><div className="value">{fmt(opsMes.reduce((s,m)=>s+m.coste,0))}</div></div>
        <div className="kpi"><div className="label">Tipo más frecuente</div><div className="value" style={{fontSize:18}}>{tipoFrecuente?TIPO_OP[tipoFrecuente[0]]?.label||tipoFrecuente[0]:"—"}</div><div className="delta">{tipoFrecuente?`${tipoFrecuente[1]} ops`:""}</div></div>
        <div className="kpi"><div className="label">Clientes activos</div><div className="value">{new Set(opsMes.map(m=>m.cliente_id)).size}</div></div>
      </div>

      <div className="tbl-wrap">
        <div className="tbl-toolbar">
          <input className="grow" placeholder="Buscar por cliente, observación…" value={q} onChange={e=>setQ(e.target.value)}/>
          <select value={tipo} onChange={e=>setTipo(e.target.value)}>
            <option value="todos">Todos los tipos</option>
            {Object.entries(TIPO_OP).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
          <select value={cli} onChange={e=>setCli(e.target.value)}>
            <option value="todos">Todos los clientes</option>
            {CLIENTES.map(c=><option key={c.id} value={c.id}>{c.empresa}</option>)}
          </select>
          <span className="count">{rows.length} ops · {fmt(total)}</span>
        </div>
        <table className="tbl">
          <thead><tr><th>ID</th><th>Tipo</th><th>Cliente</th><th>Cantidad</th><th>Coste</th><th>Fecha</th><th>Observaciones</th></tr></thead>
          <tbody>
            {rows.map(m=>(
              <tr key={m.id} className={selectedId===m.id?"selected":""} onClick={()=>onSelect(m)}>
                <td className="mono muted">#{m.id}</td>
                <td><span className={`chip ${m.tipo}`}>{TIPO_OP[m.tipo]?.label||m.tipo}</span></td>
                <td>{empresaPorCliente(m.cliente_id)}</td>
                <td className="mono num">{m.cantidad}</td>
                <td className="mono num">{fmt(m.coste)}</td>
                <td className="muted mono">{fmtFecha(m.fecha)} · {m.hora}</td>
                <td className="muted" style={{maxWidth:280,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.obs}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const TarifaForm = ({tarifa, onClose, onSaved}) => {
  const [form, setForm] = React.useState({
    nombre:tarifa?.nombre||"",
    precio_pallet_dia:tarifa?.precio_pallet_dia||0,
    precio_picking:tarifa?.precio_picking||0,
    precio_carga:tarifa?.precio_carga||0,
    precio_descarga:tarifa?.precio_descarga||0,
  });
  const [loading, setLoading] = React.useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const CAMPOS = [
    {key:"precio_pallet_dia",label:"Almacenaje €/pallet/día"},
    {key:"precio_picking",label:"Picking/Empaquetado €/ud"},
    {key:"precio_carga",label:"Carga €/operación"},
    {key:"precio_descarga",label:"Descarga €/operación"},
  ];

  const guardar = async () => {
    if(!form.nombre){alert("El nombre es obligatorio");return;}
    setLoading(true);
    try {
      const data={...form,precio_pallet_dia:parseFloat(form.precio_pallet_dia),precio_picking:parseFloat(form.precio_picking),precio_carga:parseFloat(form.precio_carga),precio_descarga:parseFloat(form.precio_descarga)};
      if(tarifa) await sbPatch("tarifas",tarifa.id,data);
      else await sbPost("tarifas",data);
      onSaved();
    } catch(e){alert("Error: "+e.message);}
    finally{setLoading(false);}
  };

  const eliminar = async () => {
    if(!confirm(`¿Eliminar tarifa "${tarifa.nombre}"?`)) return;
    setLoading(true);
    try { await sbDelete("tarifas",tarifa.id); onSaved(); }
    catch(e){alert("Error: "+e.message);}
    finally{setLoading(false);}
  };

  return (
    <div style={{background:"var(--bg-1)",border:"1px solid var(--border)",borderRadius:"var(--r-lg)",padding:20,marginBottom:16}}>
      <div className="card-head" style={{marginBottom:16}}>
        <div className="card-title">{tarifa?"Editar tarifa":"Nueva tarifa"}</div>
        <button className="iconbtn" onClick={onClose}><Icon name="close"/></button>
      </div>
      <div className="field" style={{marginBottom:12}}><label>Nombre de la tarifa *</label><input value={form.nombre} onChange={e=>set("nombre",e.target.value)} placeholder="Tarifa Estándar 2026"/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {CAMPOS.map(c=>(
          <div className="field" key={c.key}><label>{c.label}</label><input type="number" step="0.01" value={form[c.key]} onChange={e=>set(c.key,e.target.value)}/></div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:12}}>
        {tarifa && <button className="btn btn-ghost" style={{color:"var(--danger,#ef4444)",marginRight:"auto"}} onClick={eliminar}>Eliminar</button>}
        <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
        <button className="btn btn-primary" onClick={guardar} disabled={loading}>{loading?"Guardando…":"Guardar"}</button>
      </div>
    </div>
  );
};

const Facturacion = ({ onPdf }) => {

  const [anio, setAnio] = React.useState(hoy.getFullYear());

    const data=fmtCSV(resumen.map(r=>({

          <span className="card-title">Resumen por cliente · {MESES[mes-1]} {anio}</span>

          <tbody>
            {resumen.map(r=>(
              <tr key={r.cliente_id}>

  );

const _AUTH_KEY = "onus_wms_v3";
const _save = s => { try{localStorage.setItem(_AUTH_KEY,JSON.stringify(s));}catch(e){} };
const _load = () => { try{return JSON.parse(localStorage.getItem(_AUTH_KEY)||"null");}catch(e){return null;} };
const _clear = () => { try{localStorage.removeItem(_AUTH_KEY);}catch(e){} };

const LoginScreen = ({onLogin}) => {
  const [email,setEmail] = React.useState("");
  const [pw,setPw] = React.useState("");
  const [loading,setLoading] = React.useState(false);
  const [err,setErr] = React.useState("");

  const submit = async e => {
    e.preventDefault(); setLoading(true); setErr("");
    try {
      const d = await sbSignIn(email,pw);
      if(d.access_token){ _save(d); onLogin(d); }
      else setErr(d.error_description||d.message||"Credenciales incorrectas");
    } catch(e){ setErr(e.message); }
    finally{ setLoading(false); }
  };

  return (
    <div style={{minHeight:"100vh",background:"#030712",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'REM',sans-serif"}}>
      <div style={{width:360,background:"#111827",border:"1px solid #1d2638",borderRadius:16,padding:"36px 28px",boxShadow:"0 24px 64px rgba(0,0,0,.6)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{width:52,height:52,borderRadius:12,background:"linear-gradient(135deg,#000935,#001560)",border:"1px solid #1d2638",display:"grid",placeItems:"center",margin:"0 auto 12px"}}>
            <span style={{color:"#00C9CE",fontFamily:"Raleway,sans-serif",fontWeight:800,fontSize:22}}>O</span>
          </div>
          <div style={{fontFamily:"Raleway,sans-serif",fontWeight:800,fontSize:20,color:"#fff",marginBottom:4}}>Onus WMS</div>
          <div style={{fontSize:12,color:"#6b7280"}}>Warehouse Management System</div>
        </div>
        <form onSubmit={submit}>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>Email</div>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} required placeholder="tu@email.com" style={{width:"100%",boxSizing:"border-box",background:"#161f30",border:"1px solid #1d2638",borderRadius:8,padding:"10px 12px",color:"#fff",fontSize:14,fontFamily:"inherit",outline:"none"}}/>
          </div>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>Contraseña</div>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} required placeholder="••••••••" style={{width:"100%",boxSizing:"border-box",background:"#161f30",border:"1px solid #1d2638",borderRadius:8,padding:"10px 12px",color:"#fff",fontSize:14,fontFamily:"inherit",outline:"none"}}/>
          </div>
          {err && <div style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.3)",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#ef4444",marginBottom:14}}>{err}</div>}
          <button type="submit" disabled={loading} style={{width:"100%",padding:11,borderRadius:8,border:"none",background:"#00C9CE",color:"#000935",fontWeight:700,fontSize:14,fontFamily:"inherit",cursor:loading?"wait":"pointer",opacity:loading?.7:1}}>
            {loading?"Entrando…":"Entrar al WMS"}
          </button>
        </form>
      </div>
    </div>
  );
};

const WMSRoot = () => {
  const [session,setSession] = React.useState(()=>_load());
  const [ready,setReady]   = React.useState(false);
  const [,forceUpdate]     = React.useReducer(x=>x+1,0);

  React.useEffect(()=>{
    if(!session?.access_token) return;
    _wmsToken = session.access_token;
    window._wmsReload = ()=>{ Object.assign(window,{TARIFAS,CLIENTES,STOCK,MOVIMIENTOS,KPI_HOY,SERIE_14D,DIST_TIPOS,FACT_MENSUAL,empresaPorCliente,nombrePorCliente}); forceUpdate(); };
    cargarDatos().then(()=>{
      Object.assign(window,{TARIFAS,CLIENTES,STOCK,MOVIMIENTOS,KPI_HOY,SERIE_14D,DIST_TIPOS,FACT_MENSUAL,empresaPorCliente,nombrePorCliente});
      setReady(true);
    });
  },[session]);

  const handleLogin = s => { _save(s); setSession(s); };
  const handleLogout = async () => {
    if(session?.access_token){ try{await sbSignOut(session.access_token);}catch(e){} }
    _clear(); setSession(null); setReady(false); _wmsToken=null;
  };

  if(!session?.access_token) return <LoginScreen onLogin={handleLogin}/>;
  if(!ready) return (
    <div style={{minHeight:"100vh",background:"#030712",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,fontFamily:"REM,sans-serif"}}>
      <div style={{width:40,height:40,borderRadius:"50%",border:"3px solid #1d2638",borderTopColor:"#00C9CE",animation:"spin .8s linear infinite"}}/>
      <div style={{color:"#6b7280",fontSize:14}}>Cargando datos…</div>
      <style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style>
    </div>
  );

  window._wmsUser   = session.user;
  window._wmsLogout = handleLogout;
  return <App/>;
};


ReactDOM.createRoot(document.getElementById("root")).render(<WMSRoot/>);



</script>
</body>
</html>
