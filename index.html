<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Onus WMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@500;700;800&family=REM:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ============================================================
   Onus WMS — Sistema de diseño
   Azul oscuro #000935 + Turquesa #00C9CE
   Tipografía: Raleway (titulares) + REM (UI/cuerpo) + JetBrains Mono (datos)
   ============================================================ */

:root {
  /* Marca */
  --brand:        #000935;
  --brand-2:      #0a154d;
  --accent:       #00C9CE;
  --accent-soft:  rgba(0, 201, 206, 0.12);
  --accent-line:  rgba(0, 201, 206, 0.32);

  /* Tema oscuro (predeterminado) */
  --bg-0:         #030712;     /* canvas */
  --bg-1:         #0a0f1c;     /* sidebar */
  --bg-2:         #111827;     /* cards */
  --bg-3:         #161f30;     /* hover, table-stripe */
  --bg-4:         #1f2a3f;
  --border:       #1d2638;
  --border-2:     #283349;
  --fg-0:         #ffffff;
  --fg-1:         #e5e7eb;
  --fg-2:         #9ca3af;
  --fg-3:         #6b7280;
  --danger:       #ef4444;
  --warn:         #f59e0b;
  --ok:           #10b981;

  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 20px;

  --shadow-1: 0 1px 0 rgba(255,255,255,0.04) inset, 0 1px 2px rgba(0,0,0,0.3);
  --shadow-2: 0 8px 32px rgba(0,0,0,0.4);

  /* Densidad */
  --row-h: 40px;
  --pad-card: 24px;
}

[data-theme="light"] {
  --bg-0:         #fafafa;
  --bg-1:         #ffffff;
  --bg-2:         #ffffff;
  --bg-3:         #f4f5f7;
  --bg-4:         #eceef2;
  --border:       #e5e7eb;
  --border-2:     #d1d5db;
  --fg-0:         #000935;
  --fg-1:         #111827;
  --fg-2:         #4b5563;
  --fg-3:         #9ca3af;
  --shadow-1: 0 1px 0 rgba(255,255,255,1) inset, 0 1px 2px rgba(0,9,53,0.06);
  --shadow-2: 0 8px 24px rgba(0,9,53,0.08);
  --accent-soft:  rgba(0, 201, 206, 0.14);
}

[data-density="compact"] {
  --row-h: 32px;
  --pad-card: 18px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg-0);
  color: var(--fg-1);
  font-family: 'REM', 'Inter', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-variant-numeric: tabular-nums;
}

#root { min-height: 100vh; }

h1, h2, h3, h4 {
  font-family: 'Raleway', system-ui, sans-serif;
  color: var(--fg-0);
  margin: 0;
  letter-spacing: -0.01em;
}
h1 { font-weight: 800; font-size: 28px; line-height: 1.2; letter-spacing: -0.02em; }
h2 { font-family: 'REM', sans-serif; font-weight: 500; font-size: 22px; line-height: 1.3; }
h3 { font-family: 'REM', sans-serif; font-weight: 500; font-size: 16px; line-height: 1.4; }
h4 { font-family: 'REM', sans-serif; font-weight: 500; font-size: 14px; line-height: 1.4; }

button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }

/* ===== App shell ===== */
.app {
  display: grid;
  grid-template-columns: 232px 1fr;
  min-height: 100vh;
  background: var(--bg-0);
}
.app[data-nav="collapsed"] { grid-template-columns: 64px 1fr; }

/* ===== Sidebar ===== */
.sidebar {
  background: var(--bg-1);
  border-right: 1px solid var(--border);
  padding: 18px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 10px 18px;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.sidebar-mark {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--accent);
  color: #000935;
  display: grid;
  place-items: center;
  font-family: 'Raleway', sans-serif;
  font-weight: 800;
  font-size: 16px;
  flex-shrink: 0;
}
.sidebar-mark-img {
  width: 36px;
  height: 36px;
  flex-shrink: 0;
  object-fit: contain;
}
.brand-wordmark {
  height: 22px;
  width: auto;
  display: block;
}

.sidebar-brand-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
  overflow: hidden;
}
.sidebar-brand-text .name {
  font-family: 'Raleway', sans-serif;
  font-weight: 800;
  color: var(--fg-0);
  letter-spacing: -0.01em;
  font-size: 15px;
}
.sidebar-brand-text .sub {
  font-size: 10px;
  color: var(--fg-2);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 2px;
}
[data-nav="collapsed"] .sidebar-brand-text { display: none; }

.nav-group-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--fg-3);
  padding: 14px 12px 6px;
  font-weight: 600;
}
[data-nav="collapsed"] .nav-group-label { opacity: 0; height: 8px; padding: 0; overflow: hidden; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 10px;
  border-radius: var(--r-md);
  color: var(--fg-2);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  transition: background 120ms, color 120ms;
}
.nav-item:hover { background: var(--bg-3); color: var(--fg-1); }
.nav-item.active {
  background: var(--accent-soft);
  color: var(--accent);
}
.nav-item .icon {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  stroke: currentColor;
  stroke-width: 1.75;
  fill: none;
}
.nav-item .badge {
  margin-left: auto;
  background: var(--bg-3);
  color: var(--fg-2);
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 999px;
  font-weight: 600;
}
.nav-item.active .badge { background: var(--accent); color: #000935; }
[data-nav="collapsed"] .nav-item .label,
[data-nav="collapsed"] .nav-item .badge { display: none; }
[data-nav="collapsed"] .nav-item { justify-content: center; padding: 10px; }

.sidebar-foot {
  margin-top: auto;
  padding: 12px 10px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #5b8def);
  color: #000935;
  display: grid; place-items: center;
  font-weight: 700; font-size: 12px;
  flex-shrink: 0;
}
.sidebar-foot .who { line-height: 1.2; overflow: hidden; }
.sidebar-foot .who .n { font-weight: 600; font-size: 13px; color: var(--fg-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-foot .who .r { font-size: 11px; color: var(--fg-3); }
[data-nav="collapsed"] .sidebar-foot .who { display: none; }

/* ===== Main ===== */
.main {
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.topbar {
  height: 56px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 24px;
  background: var(--bg-0);
  position: sticky;
  top: 0;
  z-index: 10;
}
.crumbs {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--fg-2);
  font-size: 13px;
}
.crumbs .sep { color: var(--fg-3); }
.crumbs .now { color: var(--fg-1); font-weight: 500; }

.topbar-search {
  margin-left: auto;
  width: 320px;
  position: relative;
}
.topbar-search input {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--border);
  color: var(--fg-1);
  padding: 7px 12px 7px 34px;
  border-radius: var(--r-md);
  font-size: 13px;
  outline: none;
  transition: border-color 120ms, background 120ms;
}
.topbar-search input:focus { border-color: var(--accent); background: var(--bg-3); }
.topbar-search input::placeholder { color: var(--fg-3); }
.topbar-search svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  color: var(--fg-3);
}
.topbar .iconbtn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--fg-2);
  width: 34px; height: 34px;
  border-radius: var(--r-md);
  display: grid; place-items: center;
  transition: all 120ms;
}
.topbar .iconbtn:hover { color: var(--fg-1); border-color: var(--border-2); background: var(--bg-2); }
.kbd {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10px;
  background: var(--bg-3);
  border: 1px solid var(--border);
  padding: 2px 5px;
  border-radius: 4px;
  color: var(--fg-3);
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
}

/* ===== Page ===== */
.page {
  padding: 28px 32px 60px;
  max-width: 1480px;
  width: 100%;
  margin: 0 auto;
}
.page-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 24px;
}
.page-head .lead { color: var(--fg-2); font-size: 14px; margin-top: 6px; }
.page-actions { display: flex; gap: 8px; align-items: center; }

/* ===== Cards ===== */
.card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--pad-card);
}
.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  gap: 12px;
}
.card-title {
  font-family: 'REM', sans-serif;
  font-weight: 500;
  font-size: 14px;
  color: var(--fg-1);
}
.card-sub { font-size: 12px; color: var(--fg-3); }

/* ===== KPI ===== */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 20px;
}
.kpi {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.kpi .label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--fg-2);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 500;
}
.kpi .label .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
.kpi .value {
  font-family: 'Raleway', sans-serif;
  font-weight: 800;
  font-size: 32px;
  color: var(--fg-0);
  margin-top: 8px;
  letter-spacing: -0.02em;
  line-height: 1;
}
.kpi .delta {
  margin-top: 8px;
  font-size: 12px;
  color: var(--fg-2);
  display: flex;
  align-items: center;
  gap: 6px;
}
.kpi .delta.up { color: var(--ok); }
.kpi .delta.down { color: var(--danger); }
.kpi .spark {
  position: absolute;
  right: 0; bottom: 0;
  width: 100px; height: 40px;
  opacity: 0.7;
}

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: var(--r-md);
  font-size: 13px;
  font-weight: 500;
  border: 1px solid transparent;
  transition: all 120ms;
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent);
  color: #000935;
}
.btn-primary:hover { background: #00b8bd; }
.btn-ghost {
  background: transparent;
  color: var(--fg-1);
  border-color: var(--border);
}
.btn-ghost:hover { background: var(--bg-2); border-color: var(--border-2); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* ===== Tabla ===== */
.tbl {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
}
.tbl th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-3);
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  background: var(--bg-2);
  position: sticky; top: 0;
}
.tbl td {
  padding: 0 14px;
  height: var(--row-h);
  border-bottom: 1px solid var(--border);
  color: var(--fg-1);
  vertical-align: middle;
}
.tbl tbody tr { transition: background 120ms; }
.tbl tbody tr:hover { background: var(--bg-3); cursor: pointer; }
.tbl tbody tr.selected { background: var(--accent-soft); }
.tbl .mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--fg-1); }
.tbl .muted { color: var(--fg-2); }
.tbl .num { text-align: right; font-variant-numeric: tabular-nums; }

.tbl-wrap {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.tbl-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-2);
}
.tbl-toolbar input,
.tbl-toolbar select {
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--fg-1);
  border-radius: var(--r-sm);
  padding: 6px 10px;
  font-size: 13px;
  outline: none;
}
.tbl-toolbar input:focus,
.tbl-toolbar select:focus { border-color: var(--accent); }
.tbl-toolbar input::placeholder { color: var(--fg-3); }
.tbl-toolbar .grow { flex: 1; min-width: 200px; }
.tbl-toolbar .count { color: var(--fg-3); font-size: 12px; margin-right: auto; }

/* ===== Badges / chips ===== */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  background: var(--bg-3);
  color: var(--fg-2);
  border: 1px solid var(--border);
  text-transform: lowercase;
  letter-spacing: 0.02em;
}
.chip.almacenaje { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-line); }
.chip.picking    { background: rgba(91,141,239,0.15); color: #5b8def; border-color: rgba(91,141,239,0.3); }
.chip.packing    { background: rgba(236,72,153,0.15); color: #ec4899; border-color: rgba(236,72,153,0.3); }
.chip.carga      { background: rgba(245,158,11,0.15); color: #f59e0b; border-color: rgba(245,158,11,0.3); }
.chip.descarga   { background: rgba(167,139,250,0.15); color: #a78bfa; border-color: rgba(167,139,250,0.3); }
.chip-status {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;
}
.chip-status.activo { background: rgba(16,185,129,0.12); color: var(--ok); }
.chip-status.salido { background: var(--bg-3); color: var(--fg-3); }
.chip-status .d { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* ===== Layout helpers ===== */
.row { display: flex; gap: 12px; align-items: center; }
.col { display: flex; flex-direction: column; }
.gap-4 { gap: 16px; }
.gap-6 { gap: 24px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.grid-dash { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
.spacer { flex: 1; }

/* ===== Forms ===== */
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.field label {
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-2);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.field input,
.field select,
.field textarea {
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--fg-1);
  padding: 9px 12px;
  border-radius: var(--r-md);
  font-size: 14px;
  outline: none;
  transition: border-color 120ms;
}
.field input:focus,
.field select:focus,
.field textarea:focus { border-color: var(--accent); }

/* ===== Drawer ===== */
.drawer-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 9, 53, 0.55);
  backdrop-filter: blur(2px);
  z-index: 50;
  animation: fadein 160ms ease;
}
.drawer {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: 480px;
  background: var(--bg-1);
  border-left: 1px solid var(--border);
  z-index: 51;
  display: flex;
  flex-direction: column;
  animation: slidein 220ms cubic-bezier(0.32, 0.72, 0, 1);
  box-shadow: var(--shadow-2);
}
.drawer-head {
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.drawer-body { padding: 24px; overflow-y: auto; flex: 1; }
.drawer-foot {
  padding: 14px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
@keyframes slidein { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ===== Charts ===== */
.chart-bars {
  display: flex;
  align-items: flex-end;
  gap: 6px;
  height: 200px;
  padding: 8px 0;
}
.chart-bars .col-day {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  height: 100%;
}
.chart-bars .stack {
  flex: 1;
  width: 100%;
  display: flex;
  flex-direction: column-reverse;
  border-radius: 4px;
  overflow: hidden;
  background: var(--bg-3);
  position: relative;
}
.chart-bars .seg { transition: opacity 120ms; }
.chart-bars .seg:hover { opacity: 0.8; }
.chart-bars .axis-label { font-size: 10px; color: var(--fg-3); font-family: 'JetBrains Mono', monospace; }
.legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--fg-2); }
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-item .sw { width: 10px; height: 10px; border-radius: 2px; }

/* Donut */
.donut-wrap { display: flex; align-items: center; gap: 24px; }
.donut { width: 160px; height: 160px; flex-shrink: 0; }
.donut-list { flex: 1; display: flex; flex-direction: column; gap: 10px; }
.donut-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.donut-row .sw { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.donut-row .name { color: var(--fg-1); flex: 1; text-transform: capitalize; }
.donut-row .num { color: var(--fg-2); font-variant-numeric: tabular-nums; font-family: 'JetBrains Mono', monospace; font-size: 12px; }

/* ===== Empty states / misc ===== */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--fg-3);
  font-size: 14px;
}

.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* Cell pill for ubicación */
.loc-pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  background: var(--bg-3);
  border: 1px solid var(--border);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--fg-1);
}

/* Barcode pseudo render */
.barcode {
  display: inline-flex;
  align-items: flex-end;
  gap: 1px;
  height: 16px;
}
.barcode i {
  display: inline-block;
  width: 1.5px;
  background: var(--fg-1);
  height: 100%;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.tab {
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--fg-2);
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 120ms;
}
.tab:hover { color: var(--fg-1); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-2);
  border: 1px solid var(--accent-line);
  color: var(--fg-0);
  padding: 12px 20px;
  border-radius: var(--r-md);
  box-shadow: var(--shadow-2);
  z-index: 100;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: toastin 220ms ease;
}
.toast .ok-d { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
@keyframes toastin { from { transform: translate(-50%, 10px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

/* ====== Top-nav layout variant ====== */
.app[data-layout="top"] {
  grid-template-columns: 1fr;
}
.app[data-layout="top"] .sidebar { display: none; }
.app[data-layout="top"] .topnav {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 24px;
  height: 60px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
}
.topnav { display: none; }
.app[data-layout="top"] .topnav { display: flex; }
.topnav .brand-block {
  display: flex; align-items: center; gap: 10px;
  padding-right: 18px; margin-right: 12px;
  border-right: 1px solid var(--border);
  height: 60px;
}
.topnav .nav-item { padding: 7px 14px; }

/* Print-friendly tweaks (PDF preview pseudo) */
.invoice-paper {
  background: white;
  color: #000935;
  padding: 32px;
  border-radius: var(--r-lg);
  font-family: 'REM', sans-serif;
  border: 1px solid var(--border);
}
.invoice-paper h1, .invoice-paper h2, .invoice-paper h3 { color: #000935; }

/* Scanner placeholder */
.scanner-frame {
  border: 2px dashed var(--accent-line);
  background: var(--accent-soft);
  border-radius: var(--r-lg);
  padding: 24px;
  text-align: center;
  color: var(--fg-2);
}
.scanner-frame .big {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  color: var(--accent);
  letter-spacing: 0.1em;
  margin: 6px 0;
}

/* Section header inside cards */
.section-h {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.section-h .title {
  font-family: 'REM', sans-serif;
  font-weight: 500;
  font-size: 14px;
  color: var(--fg-1);
}
.section-h .more {
  font-size: 12px; color: var(--fg-3);
}

/* Subtle scrollbar in dark */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-2); }

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react">

// ===== data.jsx =====

const SUPABASE_URL = "https://wwlsewypxbxobhweyqbv.supabase.co";

const _sbHeaders = (token) => ({

let TARIFAS=[], CLIENTES=[], STOCK=[], MOVIMIENTOS=[];

const cargarDatos = async () => {
  try {

    TARIFAS = (trs||[]).map(t=>({...t, clientes_asignados:(cls||[]).filter(c=>c.tarifa_id===t.id).length}));

      ...s, ubicacion:s.observaciones||"—", barcode:s.pallet, sku:s.referencia||"—",

    MOVIMIENTOS = (movs||[]).map(m=>({
      ...m,
      empresa: m.clientes?.empresa||"—",
      obs: m.observaciones||"",
      hora: m.created_at?m.created_at.slice(11,16):"",
    }));

    const hoy = new Date().toISOString().split("T")[0];
    const primerMes = hoy.slice(0,7)+"-01";
    const movHoy = MOVIMIENTOS.filter(m=>m.fecha===hoy);

    CLIENTES = (cls||[]).map(c=>{
      const palletsActivos = STOCK.filter(s=>s.activo&&s.cliente_id===c.id).length;
      const facturadoMes = movMes.filter(m=>m.cliente_id===c.id).reduce((s,m)=>s+parseFloat(m.coste||0),0);
      return {...c, pago:c.condiciones_pago, pallets_activos:palletsActivos, facturado_mes:facturadoMes};
    });

    KPI_HOY = {
      ops_hoy: movHoy.length,
      delta_ops: "",
      pallets_activos: STOCK.filter(s=>s.activo).length,
      delta_pallets: "",
      ingresos_hoy: movHoy.reduce((s,m)=>s+parseFloat(m.coste||0),0),
      delta_ingresos: "",
      clientes_activos: new Set(STOCK.filter(s=>s.activo).map(s=>s.cliente_id)).size,
      ocupacion: Math.min(Math.round((STOCK.filter(s=>s.activo).length/200)*100),100),
    };

    // Serie 14 días
    SERIE_14D = Array.from({length:14},(_,i)=>{
      const d=new Date(); d.setDate(d.getDate()-(13-i));
      const key=d.toISOString().split("T")[0];
      const label=String(d.getDate());
      const dm=MOVIMIENTOS.filter(m=>m.fecha===key);
      return {
        d:label,
        alm:dm.filter(m=>m.tipo==="almacenaje").reduce((s,m)=>s+parseFloat(m.cantidad||0),0),
        pic:dm.filter(m=>["picking","empaquetado"].includes(m.tipo)).reduce((s,m)=>s+parseFloat(m.cantidad||0),0),
        car:dm.filter(m=>["carga","descarga"].includes(m.tipo)).reduce((s,m)=>s+parseFloat(m.cantidad||0),0),
      };
    });

    // Distribución por tipo
    const colores={almacenaje:"var(--accent)",picking:"#5b8def",descarga:"#a78bfa",carga:"#f59e0b",empaquetado:"#ec4899","distribucion-interna":"#10b981","distribucion-externa":"#06b6d4"};
    const counts={};
    movMes.forEach(m=>counts[m.tipo]=(counts[m.tipo]||0)+1);
    const total=movMes.length||1;
    DIST_TIPOS=Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([tipo,count])=>({tipo,count,pct:Math.round(count/total*100),color:colores[tipo]||"var(--accent)"}));

    FACT_MENSUAL=[];

    // Notificar a React que los datos cambiaron
    if(window._wmsReload) window._wmsReload();
    return true;
  } catch(e) {
    console.error("Error cargando datos:", e);
    return false;
  }
};

// ── Calcular reportes desde datos globales ───────────────────
const calcularReporteAlmacenaje = (mesN, anioN, clienteId) => {
  const primerDia = `${anioN}-${String(mesN).padStart(2,"0")}-01`;
  const ultimoDia = new Date(anioN, mesN, 0).toISOString().split("T")[0];
  
  return STOCK.filter(s => {
    const entrada = s.fecha_entrada || "";
    const salida  = s.fecha_salida  || ultimoDia;
    return entrada <= ultimoDia && salida >= primerDia && (!clienteId || s.cliente_id === clienteId);
  }).map(s => {
    const c = CLIENTES.find(c => c.id === s.cliente_id);
    const t = TARIFAS.find(t => t.id === c?.tarifa_id);
    const precioDia = parseFloat(t?.precio_pallet_dia || 0);
    const entrada = new Date(Math.max(new Date(s.fecha_entrada), new Date(primerDia)));
    const salida  = new Date(Math.min(new Date(s.fecha_salida||ultimoDia), new Date(ultimoDia)));
    const dias    = Math.max(Math.round((salida - entrada) / 86400000) + 1, 0);
    return {
      cliente: c?.nombre || "—", empresa: c?.empresa || "—",
      pallet: s.pallet, referencia: s.referencia || "—",
      fecha_entrada: s.fecha_entrada, fecha_salida: s.fecha_salida,
      dias, precio_dia: precioDia, coste: Math.round(dias * precioDia * 100) / 100,
    };
  });
};

const calcularReporteOperaciones = (mesN, anioN, tipos, clienteId) => {
  const primerDia = `${anioN}-${String(mesN).padStart(2,"0")}-01`;
  const ultimoDia = new Date(anioN, mesN, 0).toISOString().split("T")[0];
  return MOVIMIENTOS.filter(m => {
    const ok = m.fecha >= primerDia && m.fecha <= ultimoDia;
    const tipoOk = !tipos || tipos.includes(m.tipo);
    const cliOk  = !clienteId || m.cliente_id === clienteId;
    return ok && tipoOk && cliOk;
  }).map(m => {
    const c = CLIENTES.find(c => c.id === m.cliente_id);
    return { ...m, empresa: c?.empresa || "—", cliente: c?.nombre || "—" };
  });
};

const calcularResumenMensual = (mesN, anioN) => {
  return CLIENTES.map(c => {
    const alm  = calcularReporteAlmacenaje(mesN, anioN, c.id);
    const ops  = calcularReporteOperaciones(mesN, anioN, null, c.id);
    const totalAlm  = alm.reduce((s,r) => s+r.coste, 0);
    const pickCost  = ops.filter(o => ["picking","empaquetado"].includes(o.tipo)).reduce((s,o) => s+parseFloat(o.coste||0), 0);
    const cargCost  = ops.filter(o => o.tipo==="carga").reduce((s,o) => s+parseFloat(o.coste||0), 0);
    const descCost  = ops.filter(o => o.tipo==="descarga").reduce((s,o) => s+parseFloat(o.coste||0), 0);
    const distCost  = ops.filter(o => o.tipo?.includes("distribucion")).reduce((s,o) => s+parseFloat(o.coste||0), 0);
    const total = totalAlm + pickCost + cargCost + descCost + distCost;
    const t = TARIFAS.find(t => t.id === c.tarifa_id);
    if (total === 0 && alm.length === 0) return null;
    return {
      cliente_id: c.id, cliente: c.nombre, empresa: c.empresa || "—",
      condiciones_pago: c.condiciones_pago || c.pago || "—",
      tarifa: t?.nombre || "Sin tarifa",
      pallets_almacenados: alm.length,
      total_almacenaje: Math.round(totalAlm*100)/100,
      picking_coste: Math.round(pickCost*100)/100,
      cargas_coste: Math.round(cargCost*100)/100,
      descargas_coste: Math.round(descCost*100)/100,
      distribucion_coste: Math.round(distCost*100)/100,
      total: Math.round(total*100)/100,
      movimientos: ops,
    };
  }).filter(Boolean).sort((a,b) => b.total - a.total);
};

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// ---- Toast ----
const Toast = ({ msg }) => msg ? (
  <div className="toast"><span className="ok-d" /> {msg}</div>
) : null;

// ---- Drawer ----
const Drawer = ({ open, onClose, title, children, footer }) => {
  if (!open) return null;
  return (
    <>
      <div className="drawer-backdrop" onClick={onClose} />
      <div className="drawer">
        <div className="drawer-head">
          <h3>{title}</h3>
          <button className="iconbtn" onClick={onClose}><Icon name="close" /></button>
        </div>
        <div className="drawer-body">{children}</div>
        {footer && <div className="drawer-foot">{footer}</div>}
      </div>
    </>
  );
};

// ---- Sparkline ----
const Spark = ({ data, color = "var(--accent)" }) => {
  const w = 100, h = 40, max = Math.max(...data), min = Math.min(...data);
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / Math.max(max - min, 1)) * (h - 6) - 3;
    return `${x},${y}`;
  }).join(" ");
  return (
    <svg className="spark" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" />
      <polyline points={`${pts} ${w},${h} 0,${h}`} fill={color} opacity="0.08" />
    </svg>
  );
};

Object.assign(window, { Icon, Sidebar, TopNav, Topbar, Toast, Drawer, Spark, NAV });

        <button className="btn btn-primary" onClick={() => onCreate({tipo,cliente,cant,obs,coste})}>
          <Icon name="check"/> Registrar operación
        </button>
      </>}>
      <div className="field">
        <label>Tipo de operación</label>
        <div style={{display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:6}}>
          {Object.entries(TIPO_OP).map(([k,v]) => (
            <button key={k}
              onClick={() => setTipo(k)}
              className={`btn btn-sm ${tipo===k?"btn-primary":"btn-ghost"}`}
              style={{justifyContent:"center", padding:"10px 4px", fontSize:11}}>
              {v.label}
            </button>
          ))}
        </div>
      </div>
      <div className="field">
        <label>Cliente</label>
        <select value={cliente} onChange={e=>setCliente(e.target.value)}>
          {CLIENTES.map(c => <option key={c.id} value={c.id}>{c.empresa} · {c.nombre}</option>)}
        </select>
      </div>
      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
        <div className="field">
          <label>Cantidad</label>
          <input type="number" value={cant} onChange={e=>setCant(e.target.value)}/>
        </div>
        <div className="field">
          <label>Fecha</label>
          <input type="date" defaultValue="2026-04-29"/>
        </div>
      </div>
      <div className="field">
        <label>Observaciones</label>
        <textarea rows="3" value={obs} onChange={e=>setObs(e.target.value)} placeholder="Descripción opcional…"/>
      </div>

      <div style={{padding:16, background:"var(--bg-3)", border:"1px solid var(--accent-line)", borderRadius:"var(--r-md)", marginTop:8}}>
        <div style={{display:"flex", justifyContent:"space-between", marginBottom:6, fontSize:12, color:"var(--fg-2)"}}>
          <span>Tarifa: {tarifa?.nombre || "—"}</span>
          <span>Precio: {fmt(precio)}</span>
        </div>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"baseline"}}>
          <span style={{fontSize:13, color:"var(--fg-1)"}}>Coste calculado</span>
          <span className="mono" style={{fontSize:24, fontWeight:600, color:"var(--accent)"}}>{fmt(coste)}</span>
        </div>
      </div>
    </Drawer>
  );
};

// ---- Scanner ----
const Scanner = ({ open, onClose, onScan }) => {
  const [code, setCode] = React.useState("");
  const inputRef = React.useRef(null);
  React.useEffect(() => { if (open && inputRef.current) inputRef.current.focus(); }, [open]);

  const tryScan = (val) => {
    const found = STOCK.find(s => s.barcode === val || s.sku === val || s.pallet === val);
    if (found) onScan(found);
  };

  return (
    <Drawer open={open} onClose={onClose} title="Lector de códigos">
      <div className="scanner-frame">
        <div style={{fontSize:12, color:"var(--fg-2)", textTransform:"uppercase", letterSpacing:".08em"}}>Escanee o introduzca el código</div>
        <div className="big">▮▯▮▯▮▯ ▮ ▮▯▮▯▮ ▮▯▮</div>
        <div className="barcode" style={{height:32, marginTop:8}}>
          {Array.from({length:48}).map((_,i) => <i key={i} style={{width: (i%3===0?2.5:1)+"px", opacity: 0.4 + (i%5)*0.15}}/>)}
        </div>
      </div>
      <div className="field" style={{marginTop:20}}>
        <label>Código (Barcode · SKU · Pallet)</label>
        <input ref={inputRef} value={code}
          onChange={e=>setCode(e.target.value)}
          onKeyDown={e => e.key==="Enter" && tryScan(code)}
          placeholder="8412345000142  ·  SKU-77821  ·  PAL-00142"/>
      </div>
      <div style={{fontSize:12, color:"var(--fg-3)", marginBottom:12}}>Pruebe: <code style={{color:"var(--accent)"}}>SKU-91100</code> o <code style={{color:"var(--accent)"}}>PAL-00146</code></div>

      <div className="divider"/>
      <div className="card-title" style={{marginBottom:12}}>Códigos recientes</div>
      {STOCK.slice(0,4).map(s => (
        <div key={s.id} onClick={() => onScan(s)}
          style={{display:"flex", alignItems:"center", gap:12, padding:"10px 12px", marginBottom:6, background:"var(--bg-2)", border:"1px solid var(--border)", borderRadius:"var(--r-md)", cursor:"pointer"}}>
          <div className="barcode">
            {Array.from({length:18}).map((_,i) => <i key={i} style={{width: (i%4===0?2:1)+"px"}}/>)}
          </div>
          <div style={{flex:1, minWidth:0}}>
            <div className="mono" style={{fontSize:13, fontWeight:600}}>{s.pallet} · {s.sku}</div>
            <div style={{fontSize:11, color:"var(--fg-3)"}}>{empresaPorCliente(s.cliente_id)} · {s.referencia}</div>
          </div>
          <span className="loc-pill">{s.ubicacion}</span>
        </div>
      ))}
    </Drawer>
  );
};

const Perfiles = ({ onInvite, onEdit }) => {
  const [tab, setTab] = React.useState("usuarios");
  const [q, setQ] = React.useState("");
  const [rol, setRol] = React.useState("todos");

  const usuarios = PERFILES.filter(u => {
    if (q && !`${u.nombre} ${u.email}`.toLowerCase().includes(q.toLowerCase())) return false;
    if (rol !== "todos" && u.rol !== rol) return false;
    return true;
  });

  return (
    <div className="page">
      <div className="page-head">
        <div>
          <h1>Perfiles</h1>
          <p className="lead">Gestión de usuarios, roles y permisos del sistema</p>
        </div>
        <div className="page-actions">
          <button className="btn btn-ghost"><Icon name="download"/> Exportar</button>
          <button className="btn btn-primary" onClick={onInvite}><Icon name="plus"/> Invitar usuario</button>
        </div>
      </div>

      <div className="kpi-grid" style={{gridTemplateColumns:"repeat(4,1fr)"}}>
        <div className="kpi"><div className="label">Usuarios totales</div><div className="value">{PERFILES.length}</div><div className="delta">{PERFILES.filter(p=>p.estado==="activo").length} activos</div></div>
        <div className="kpi"><div className="label">Roles configurados</div><div className="value">{ROLES.length}</div><div className="delta">1 con acceso total</div></div>

      </div>

      <div className="tabs">
        <button className={`tab ${tab==="usuarios"?"active":""}`} onClick={()=>setTab("usuarios")}>Usuarios · {PERFILES.length}</button>
        <button className={`tab ${tab==="roles"?"active":""}`} onClick={()=>setTab("roles")}>Roles y permisos · {ROLES.length}</button>
        <button className={`tab ${tab==="actividad"?"active":""}`} onClick={()=>setTab("actividad")}>Actividad reciente</button>
      </div>

      {tab === "usuarios" && (
        <div className="tbl-wrap">
          <div className="tbl-toolbar">
            <input className="grow" placeholder="Buscar por nombre o email…" value={q} onChange={e=>setQ(e.target.value)}/>
            <select value={rol} onChange={e=>setRol(e.target.value)}>
              <option value="todos">Todos los roles</option>
              {ROLES.map(r => <option key={r.id} value={r.nombre}>{r.nombre}</option>)}
            </select>
            <span className="count">{usuarios.length} usuarios</span>
          </div>
          <table className="tbl">
            <thead>

            </thead>
            <tbody>
              {usuarios.map(u => (
                <tr key={u.id} onClick={() => onEdit(u)}>
                  <td>
                    <div style={{display:"flex", alignItems:"center", gap:10}}>
                      <div className="avatar" style={{background:`linear-gradient(135deg, ${u.color}, ${u.color}aa)`, width:30, height:30, fontSize:11}}>{u.iniciales}</div>
                      <div style={{fontWeight:500}}>{u.nombre}</div>
                    </div>
                  </td>
                  <td className="muted mono" style={{fontSize:12}}>{u.email}</td>
                  <td><span className="chip">{u.rol}</span></td>
                  <td>

                    {u.estado === "invitado" && <span className="chip-status" style={{background:"rgba(245,158,11,.15)", color:"#f59e0b"}}><span className="d"/> invitado</span>}

                  <td className="muted mono" style={{fontSize:12}}>{u.ultimo}</td>
                  <td><button className="btn btn-ghost btn-sm" onClick={(e)=>{e.stopPropagation(); onEdit(u);}}><Icon name="edit"/></button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {tab === "roles" && (
        <>
          <div className="grid-2" style={{marginBottom:20}}>

                    <div style={{width:8, height:32, background:r.color, borderRadius:2}}/>

                      <h3 style={{color:"var(--fg-0)"}}>{r.nombre}</h3>
                      <div className="card-sub">{r.usuarios} usuario{r.usuarios!==1?"s":""}</div>

                <div style={{display:"flex", flexWrap:"wrap", gap:6}}>

                    <span key={k} className="chip" style={{textTransform:"capitalize"}}>
                      {k} · <span style={{color: PERMISO_TXT[v].color, marginLeft:4}}>{PERMISO_TXT[v].label}</span>
                    </span>
                  ))}
                </div>
              </div>
            ))}
          </div>

          <div className="card" style={{padding:0}}>
            <div className="card-head" style={{padding:"20px 24px 0"}}>
              <div className="card-title">Matriz de permisos</div>
              <button className="btn btn-primary btn-sm"><Icon name="plus"/> Nuevo rol</button>
            </div>
            <table className="tbl" style={{marginTop:14}}>
              <thead>
                <tr>
                  <th>Módulo</th>
                  {ROLES.map(r => <th key={r.id} style={{textAlign:"center"}}>{r.nombre}</th>)}

              </thead>
              <tbody>
                {MODULOS_PERM.map(m => (
                  <tr key={m.id}>
                    <td style={{fontWeight:500}}>{m.label}</td>
                    {ROLES.map(r => {
                      const p = PERMISO_TXT[r.permisos[m.id]];
                      return (
                        <td key={r.id} style={{textAlign:"center"}}>
                          <span style={{display:"inline-block", padding:"3px 10px", borderRadius:4, fontSize:11, fontWeight:600, color: p.color, background: r.permisos[m.id] === "no" ? "transparent" : "var(--bg-3)"}}>
                            {p.label}
                          </span>
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}

      {tab === "actividad" && (
        <div className="card" style={{padding:0}}>
          <table className="tbl">
            <thead><tr><th>Usuario</th><th>Acción</th><th>Recurso</th><th>Cuándo</th></tr></thead>
            <tbody>
              {[
                { u:"Alejandro Meneses", a:"Inició sesión", r:"—",                          c:"Hace 2 min" },
                { u:"Marta Ruiz",        a:"Registró operación", r:"Picking · Pedido #1042", c:"Hace 18 min" },
                { u:"Javier López",      a:"Entrada de pallet",  r:"PAL-00148 · Ubicación C-08-03", c:"Hace 1 h" },
                { u:"Sofía Romero",      a:"Generó factura PDF", r:"Almacenes Ibéricos · Abr 2026", c:"Hace 3 h" },
                { u:"Marta Ruiz",        a:"Actualizó tarifa",   r:"Tarifa Premium",          c:"Ayer 16:30" },
                { u:"Daniel Vega",       a:"Salida de pallet",   r:"PAL-00154",                c:"Ayer 14:12" },
                { u:"Alejandro Meneses", a:"Invitó usuario",     r:"carmen.ortiz@onusexpress.com", c:"Ayer 11:08" },
              ].map((e,i) => {
                const u = PERFILES.find(p => p.nombre === e.u);
                return (
                  <tr key={i}>
                    <td>
                      <div style={{display:"flex", alignItems:"center", gap:10}}>
                        <div className="avatar" style={{background:`linear-gradient(135deg, ${u?.color || "#5b8def"}, ${u?.color || "#5b8def"}aa)`, width:26, height:26, fontSize:10}}>{u?.iniciales || "?"}</div>
                        <span style={{fontWeight:500}}>{e.u}</span>

                    <td className="muted">{e.r}</td>
                    <td className="muted mono" style={{fontSize:12}}>{e.c}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
};

const PerfilDrawer = ({ open, perfil, onClose, onSave, mode }) => {
  const [nombre, setNombre] = React.useState(perfil?.nombre || "");
  const [email, setEmail]   = React.useState(perfil?.email  || "");
  const [rol, setRol]       = React.useState(perfil?.rol    || "Lectura");
  const [estado, setEstado] = React.useState(perfil?.estado || "invitado");

  React.useEffect(() => {
    setNombre(perfil?.nombre || "");
    setEmail(perfil?.email  || "");
    setRol(perfil?.rol      || "Lectura");
    setEstado(perfil?.estado|| "invitado");
  }, [perfil, open]);

  const rolObj = ROLES.find(r => r.nombre === rol);

  return (
    <Drawer open={open} onClose={onClose}
      title={mode === "new" ? "Invitar usuario" : `Editar perfil`}
      footer={<>
        <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
        {mode !== "new" && <button className="btn btn-ghost" style={{color:"var(--danger)"}}><Icon name="trash"/> Eliminar</button>}
        <button className="btn btn-primary" onClick={() => onSave({nombre, email, rol, estado})}>
          <Icon name="check"/> {mode === "new" ? "Enviar invitación" : "Guardar cambios"}
        </button>
      </>}>
      {perfil && mode !== "new" && (
        <div style={{display:"flex", alignItems:"center", gap:14, marginBottom:20, paddingBottom:18, borderBottom:"1px solid var(--border)"}}>
          <div className="avatar" style={{width:56, height:56, fontSize:18, background:`linear-gradient(135deg, ${perfil.color}, ${perfil.color}aa)`}}>{perfil.iniciales}</div>
          <div>
            <div style={{fontWeight:600, fontSize:16}}>{perfil.nombre}</div>
            <div style={{fontSize:12, color:"var(--fg-3)"}}>Última actividad: {perfil.ultimo}</div>
          </div>
        </div>
      )}

      <div className="field">
        <label>Nombre completo</label>
        <input value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Nombre y apellidos"/>
      </div>
      <div className="field">
        <label>Email corporativo</label>
        <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="usuario@onusexpress.com"/>
      </div>
      <div className="field">
        <label>Rol</label>
        <select value={rol} onChange={e=>setRol(e.target.value)}>
          {ROLES.map(r => <option key={r.id} value={r.nombre}>{r.nombre}</option>)}
        </select>
        {rolObj && <div style={{fontSize:12, color:"var(--fg-3)", marginTop:6}}>{rolObj.desc}</div>}
      </div>
      {mode !== "new" && (
        <div className="field">
          <label>Estado</label>
          <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:6}}>
            {["activo","invitado","inactivo"].map(s => (
              <button key={s}
                onClick={() => setEstado(s)}
                className={`btn btn-sm ${estado===s?"btn-primary":"btn-ghost"}`}
                style={{justifyContent:"center", textTransform:"capitalize"}}>
                {s}
              </button>
            ))}
          </div>
        </div>
      )}

      {rolObj && (
        <div style={{marginTop:18, padding:16, background:"var(--bg-3)", borderRadius:"var(--r-md)", border:"1px solid var(--border)"}}>
          <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:12}}>
            <Icon name="shield"/>
            <div className="card-title">Permisos del rol · {rolObj.nombre}</div>
          </div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:6}}>
            {MODULOS_PERM.map(m => {
              const p = PERMISO_TXT[rolObj.permisos[m.id]];
              return (
                <div key={m.id} style={{display:"flex", justifyContent:"space-between", padding:"6px 10px", background:"var(--bg-2)", borderRadius:"var(--r-sm)", fontSize:12}}>
                  <span style={{color:"var(--fg-2)"}}>{m.label}</span>
                  <span style={{color: p.color, fontWeight:600}}>{p.label}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </Drawer>
  );
};

Object.assign(window, { Perfiles, PerfilDrawer, PERFILES, ROLES });

const App = () => {
  const [tweaks, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{
    "theme": "dark",
    "density": "balanced",
    "layout": "sidebar",
    "accent": "#00C9CE"
  }/*EDITMODE-END*/);

  const [view, setView] = React.useState("dashboard");
  const [newOpOpen, setNewOpOpen] = React.useState(false);
  const [scannerOpen, setScannerOpen] = React.useState(false);
  const [selectedOp, setSelectedOp] = React.useState(null);
  const [selectedPallet, setSelectedPallet] = React.useState(null);
  const [invoiceFor, setInvoiceFor] = React.useState(null);
  const [perfilOpen, setPerfilOpen] = React.useState(null); // {perfil, mode}
  const [toast, setToast] = React.useState("");

  React.useEffect(() => {
    document.documentElement.setAttribute("data-theme", tweaks.theme);
    document.documentElement.setAttribute("data-density", tweaks.density === "compact" ? "compact" : "balanced");
    const a = tweaks.accent || "#00C9CE";
    document.documentElement.style.setProperty("--accent", a);
    document.documentElement.style.setProperty("--accent-soft", a + "1f");
    document.documentElement.style.setProperty("--accent-line", a + "55");
  }, [tweaks.theme, tweaks.density, tweaks.accent]);

  const showToast = (m) => { setToast(m); setTimeout(() => setToast(""), 2400); };

  const crumbsMap = {
    dashboard: "Dashboard", operaciones: "Operaciones", stock: "Stock",
    clientes: "Clientes", tarifas: "Tarifas",
    reportes: "Reportes", facturacion: "Facturación",
    perfiles: "Perfiles",
  };

  const goNav = (id) => { setView(id); };

  const onScanned = (s) => {
    setScannerOpen(false);
    setSelectedPallet(s);
    setView("stock");
    showToast(`Pallet ${s.pallet} localizado en ${s.ubicacion}`);
  };

  return (
    <div className="app" data-screen-label={`01 ${crumbsMap[view]}`}
      data-nav={tweaks.layout === "collapsed" ? "collapsed" : "expanded"}
      data-layout={tweaks.layout === "top" ? "top" : "side"}>
      {tweaks.layout !== "top" && <Sidebar active={view} onNav={goNav} collapsed={tweaks.layout === "collapsed"}/>}
      <div className="main">
        {tweaks.layout === "top" && <TopNav active={view} onNav={goNav}/>}
        <Topbar
          crumbs={crumbsMap[view]}
          onNew={() => setNewOpOpen(true)}
          onScanner={() => setScannerOpen(true)}/>
        {view === "dashboard"   && <Dashboard goTo={goNav}/>}
        {view === "operaciones" && <Operaciones onNew={() => setNewOpOpen(true)} onSelect={setSelectedOp} selectedId={selectedOp?.id}/>}
        {view === "stock"       && <Stock onScanner={() => setScannerOpen(true)} onSelect={setSelectedPallet} selectedId={selectedPallet?.id}/>}
        {view === "clientes"    && <Clientes/>}
        {view === "tarifas"     && <Tarifas/>}
        {view === "reportes"    && <Reportes/>}
        {view === "facturacion" && <Facturacion onPdf={setInvoiceFor}/>}
        {view === "perfiles"    && <Perfiles
          onInvite={() => setPerfilOpen({perfil: null, mode: "new"})}
          onEdit={(p) => setPerfilOpen({perfil: p, mode: "edit"})}/>}
      </div>

      <NewOpDrawer
        open={newOpOpen}
        onClose={() => setNewOpOpen(false)}
        onCreate={(op) => { setNewOpOpen(false); showToast(`Operación registrada · coste ${fmt(op.coste)}`); }}/>
      <Scanner open={scannerOpen} onClose={() => setScannerOpen(false)} onScan={onScanned}/>
      <StockDetail pallet={selectedPallet} onClose={() => setSelectedPallet(null)}/>
      <OpDetail op={selectedOp} onClose={() => setSelectedOp(null)}/>
      <InvoicePreview cliente={invoiceFor} onClose={() => setInvoiceFor(null)}/>
      <PerfilDrawer
        open={!!perfilOpen}
        perfil={perfilOpen?.perfil}
        mode={perfilOpen?.mode}
        onClose={() => setPerfilOpen(null)}
        onSave={(data) => {
          setPerfilOpen(null);
          showToast(perfilOpen?.mode === "new" ? `Invitación enviada a ${data.email}` : `Perfil de ${data.nombre} actualizado`);
        }}/>

      <Toast msg={toast}/>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Apariencia"/>
        <TweakRadio label="Tema" value={tweaks.theme} onChange={v => setTweak("theme", v)}
          options={["dark","light"]}/>
        <TweakRadio label="Densidad" value={tweaks.density} onChange={v => setTweak("density", v)}
          options={["balanced","compact"]}/>
        <TweakColor label="Acento" value={tweaks.accent} onChange={v => setTweak("accent", v)}/>
        <TweakSection label="Navegación"/>
        <TweakRadio label="Layout" value={tweaks.layout} onChange={v => setTweak("layout", v)}
          options={["sidebar","collapsed","top"]}/>
        <TweakSection label="Acentos rápidos"/>
        <div style={{display:"flex", gap:6, padding:"4px 12px 8px"}}>
          {["#00C9CE","#5b8def","#a78bfa","#f59e0b","#ec4899"].map(c => (
            <button key={c} onClick={() => setTweak("accent", c)}
              style={{width:24,height:24,borderRadius:6,background:c, border: tweaks.accent===c ? "2px solid #29261b" : "2px solid transparent", cursor:"pointer", padding:0}}/>
          ))}
        </div>
      </TweaksPanel>
    </div>
  );
};


// ============================================================
// Auth + Login Screen
// ============================================================
const _AUTH_KEY = "onus_wms_v2_session";
const _saveSession = s => { try{localStorage.setItem(_AUTH_KEY,JSON.stringify(s));}catch(e){} };
const _loadSession = () => { try{return JSON.parse(localStorage.getItem(_AUTH_KEY)||"null");}catch(e){return null;} };
const _clearSession = () => { try{localStorage.removeItem(_AUTH_KEY);}catch(e){} };

const LoginScreen = ({onLogin}) => {
  const [email,setEmail] = React.useState("");
  const [pw,setPw] = React.useState("");
  const [loading,setLoading] = React.useState(false);
  const [err,setErr] = React.useState("");

  const submit = async e => {
    e.preventDefault(); setLoading(true); setErr("");
    try {
      const data = await sbSignIn(email, pw);
      if(data.access_token) { _saveSession(data); onLogin(data); }
      else setErr(data.error_description||data.message||"Credenciales incorrectas");
    } catch(e){ setErr(e.message); }
    finally{ setLoading(false); }
  };

  return (
    <div style={{minHeight:"100vh",background:"#030712",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'REM',sans-serif"}}>
      <div style={{width:360,background:"#111827",border:"1px solid #1d2638",borderRadius:16,padding:"36px 28px",boxShadow:"0 24px 64px rgba(0,0,0,.6)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{width:52,height:52,borderRadius:12,background:"linear-gradient(135deg,#000935,#001560)",border:"1px solid #1d2638",display:"grid",placeItems:"center",margin:"0 auto 12px"}}>
            <span style={{color:"#00C9CE",fontFamily:"Raleway,sans-serif",fontWeight:800,fontSize:22}}>O</span>
          </div>
          <div style={{fontFamily:"Raleway,sans-serif",fontWeight:800,fontSize:20,color:"#fff",marginBottom:4}}>Onus WMS</div>
          <div style={{fontSize:12,color:"#6b7280"}}>Warehouse Management System</div>
        </div>
        <form onSubmit={submit}>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>Email</div>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} required placeholder="tu@email.com"
              style={{width:"100%",boxSizing:"border-box",background:"#161f30",border:"1px solid #1d2638",borderRadius:8,padding:"10px 12px",color:"#fff",fontSize:14,fontFamily:"inherit",outline:"none"}}/>
          </div>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>Contraseña</div>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} required placeholder="••••••••"
              style={{width:"100%",boxSizing:"border-box",background:"#161f30",border:"1px solid #1d2638",borderRadius:8,padding:"10px 12px",color:"#fff",fontSize:14,fontFamily:"inherit",outline:"none"}}/>
          </div>
          {err && <div style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.3)",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#ef4444",marginBottom:14}}>{err}</div>}
          <button type="submit" disabled={loading} style={{width:"100%",padding:"11px",borderRadius:8,border:"none",background:"#00C9CE",color:"#000935",fontWeight:700,fontSize:14,fontFamily:"inherit",cursor:loading?"wait":"pointer",opacity:loading?.7:1}}>
            {loading ? "Entrando…" : "Entrar al WMS"}
          </button>
        </form>
      </div>
    </div>
  );
};

const WMSRoot = () => {
  const [session, setSession] = React.useState(() => _loadSession());
  const [ready, setReady] = React.useState(false);
  const [, forceUpdate] = React.useReducer(x=>x+1, 0);

  React.useEffect(() => {
    if(!session?.access_token) return;
    _wmsToken = session.access_token;
    window._wmsReload = () => {
      // sync globals to window
      Object.assign(window, { TARIFAS, CLIENTES, STOCK, MOVIMIENTOS, KPI_HOY, SERIE_14D, DIST_TIPOS, FACT_MENSUAL, empresaPorCliente, nombrePorCliente });
      forceUpdate();
    };
    cargarDatos().then(() => {
      Object.assign(window, { TARIFAS, CLIENTES, STOCK, MOVIMIENTOS, KPI_HOY, SERIE_14D, DIST_TIPOS, FACT_MENSUAL, empresaPorCliente, nombrePorCliente });
      setReady(true);
    });
  }, [session]);

  const handleLogin = async (s) => {
    _saveSession(s); setSession(s);
  };

  const handleLogout = async () => {
    if(session?.access_token) { try{ await sbSignOut(session.access_token); }catch(e){} }
    _clearSession(); setSession(null); setReady(false); _wmsToken=null;
  };

  if(!session?.access_token) return <LoginScreen onLogin={handleLogin}/>;

  if(!ready) return (
    <div style={{minHeight:"100vh",background:"#030712",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,fontFamily:"REM,sans-serif"}}>
      <div style={{width:40,height:40,borderRadius:"50%",border:"3px solid #1d2638",borderTopColor:"#00C9CE",animation:"spin .8s linear infinite"}}/>
      <div style={{color:"#6b7280",fontSize:14}}>Cargando datos del almacén…</div>
      <style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style>
    </div>
  );

  // Patch sidebar user info via a global so App can pass it
  window._wmsUser = session.user;
  window._wmsLogout = handleLogout;

  return <App/>;
};


ReactDOM.createRoot(document.getElementById("root")).render(<WMSRoot/>);
